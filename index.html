<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<title>Dispatch Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

#video{
    width:100%;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

#stats{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.item{
    padding:8px;
    border-bottom:1px solid #ddd;
    font-size:14px;
    word-break:break-all;
}

.success{
    color:green;
}

    #cameraContainer{
    position:relative;
}

#scanFlash{
    position:absolute;
    width:2cm;
    height:2cm;
    background:red;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    pointer-events:none;
    z-index:1000;
    box-shadow:0 0 20px red;
}

    button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
    transition:opacity 0.3s ease;
}
       
</style>
</head>

<body>

<h2>Dispatch Scanner</h2>

<input
id="invoice"
placeholder="Invoice Number (Optional)"
>

<div id="stats">
Scans: <span id="count">0</span>
</div>

<button onclick="startScanner()">
📷 Start Scanning
</button>

<button onclick="stopScanner()">
⛔ Stop Scanning
</button>

<button onclick="toggleTorch()">
🔦 Torch
</button>

<div id="cameraContainer">
    <video id="video"></video>
    <div id="scanFlash"></div>
</div>

<button id="uploadBtn" onclick="uploadData()">
☁ Upload
</button>

<div id="list"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwnsVvc874mjP7CVq4U2K1wF21n26BXmqkV5TI2dxB0uPJPCWEwinxihqrWt7RsarI_ng/exec";

let scans = [];
let codeReader = null;
let lastScan = "";
let lastTime = 0;
let torchOn = false;
let currentTrack = null;

function materialName(code){

    const map = {
        A:"ABS",
        C:"PC",
        P:"PP",
        N:"Nylon"
    };

    return map[code] || code;
}
    
function flashRedDot(){

    const dot =
        document.getElementById("scanFlash");

    dot.style.display = "block";

    setTimeout(() => {

        dot.style.display = "none";

    }, 200); // 0.2 second
}
    
function parseBarcode(barcode){

    barcode = barcode.trim();

    if(!/^Sn\/[A-Z0-9]{12}[A-Z]$/.test(barcode)){
        return null;
    }

    const datePart = barcode.substring(3,9);

    const yy = datePart.substring(0,2);
    const mm = datePart.substring(2,4);
    const dd = datePart.substring(4,6);

    return {

        barcode: barcode,

        mfgDate: `20${yy}-${mm}-${dd}`,

        productCode: barcode.substring(9,12),

        boxNo: barcode.substring(12,15),

        material: materialName(
            barcode.substring(15,16)
        )

    };
}

function render(){

    document.getElementById("count").innerText =
        scans.length;

    const list =
        document.getElementById("list");

    list.innerHTML = "";

    scans.slice().reverse().forEach(item => {

        list.innerHTML += `
        <div class="item">
            ${item.barcode}
        </div>
        `;

    });
}

function beep(){

    const ctx =
        new (window.AudioContext ||
             window.webkitAudioContext)();

    const osc =
        ctx.createOscillator();

    const gain =
        ctx.createGain();

    osc.type = "square";
    osc.frequency.value = 1800;

    gain.gain.setValueAtTime(
        0.8,
        ctx.currentTime
    );

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        ctx.currentTime + 0.08
    );

    osc.stop(
        ctx.currentTime + 0.08
    );
}
async function startScanner(){

    try{

      codeReader =
    new ZXing.BrowserMultiFormatReader();

        const video =
            document.getElementById("video");
        video.addEventListener("loadedmetadata", () => {

    const stream = video.srcObject;

    if (stream) {

        currentTrack =
            stream.getVideoTracks()[0];

        console.log("Camera track found");

    }

});
        

        const devices =
            await codeReader.listVideoInputDevices();

        if(devices.length === 0){

            alert("No camera found");

            return;
        }

        const selectedDeviceId =
            devices[devices.length - 1].deviceId;

        codeReader.decodeFromConstraints(
{
video: {
facingMode: "environment"
}
},
video,
(result, err) => {

                if(result){

                    const barcode =
                        result.getText();

                    const now =
                        Date.now();

                    if(
                        barcode === lastScan &&
                        now - lastTime < 1500
                    ){
                        return;
                    }

                    lastScan = barcode;
                    lastTime = now;

                   const parsed =
    parseBarcode(barcode);

if(!parsed){
    return;
}

scans.push(parsed);

render();

beep();

flashRedDot();
                    if(navigator.vibrate){
    navigator.vibrate(100);
}
                }

            }
        );

    }catch(error){

        console.error(error);

        alert(
            "Camera error. Check browser permissions."
        );
    }
}

function stopScanner(){

    if(codeReader){

        codeReader.reset();
    }
}

    async function toggleTorch() {

    if (!currentTrack) {
        alert("Start scanner first");
        return;
    }

    const capabilities = currentTrack.getCapabilities();

    if (!capabilities.torch) {
        alert("Torch not supported on this device");
        return;
    }

    try {

        torchOn = !torchOn;

        await currentTrack.applyConstraints({
            advanced: [{
                torch: torchOn
            }]
        });

    } catch (err) {

        console.error(err);
        alert("Unable to control torch");

    }
}
    
async function uploadData(){

    const btn =
        document.getElementById("uploadBtn");

    if(btn.disabled){
        return;
    }

    btn.disabled = true;
    btn.style.opacity = "0.5";
    

    if(scans.length === 0){

        alert("No scans found");

        btn.disabled = false;
        btn.style.opacity = "1";

        return;
    }

    const unique = [
        ...new Map(
            scans.map(x => [
                x.barcode,
                x
            ])
        ).values()
    ];

    const invoice =
        document.getElementById("invoice")
        .value;

    const records =
        unique.map(x => ({

            invoice,
            ...x

        }));

    try{

        const response =
            await fetch(
                SCRIPT_URL,
                {
                    method:"POST",
                    body:JSON.stringify({
                        records
                    })
                }
            );

        const text =
            await response.text();

        const result =
            JSON.parse(text);

        if(result.success){

    alert(
        `Uploaded ${records.length} unique records`
    );

    scans = [];

    render();

    btn.disabled = false;
    btn.style.opacity = "1";

        }else{
            alert(
                "Upload failed"
            );
        }

   }catch(error){

    console.error(error);

    alert("Upload failed");

    btn.disabled = false;
    btn.style.opacity = "1";
}
}

</script>
</div>
</body>
</html>
