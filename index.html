<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dispatch Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

#video{
    width:100%;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

#stats{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.item{
    padding:8px;
    border-bottom:1px solid #ddd;
    font-size:14px;
    word-break:break-all;
}

.success{
    color:green;
}
</style>
</head>

<body>

<h2>Dispatch Scanner</h2>

<input
id="invoice"
placeholder="Invoice Number (Optional)"
>

<div id="stats">
Scans: <span id="count">0</span>
</div>

<button onclick="startScanner()">
📷 Start Scanning
</button>

<button onclick="stopScanner()">
⛔ Stop Scanning
</button>

<button onclick="toggleTorch()">
🔦 Torch
</button>

<video id="video"></video>

<button onclick="uploadData()">
☁ Upload
</button>

<div id="list"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwnsVvc874mjP7CVq4U2K1wF21n26BXmqkV5TI2dxB0uPJPCWEwinxihqrWt7RsarI_ng/exec";

let scans = [];
let codeReader = null;
let lastScan = "";
let lastTime = 0;
let torchOn = false;
let currentTrack = null;

function materialName(code){

    const map = {
        A:"ABS",
        C:"PC",
        P:"PP",
        N:"Nylon"
    };

    return map[code] || code;
}

function parseBarcode(barcode){

    barcode = barcode.trim();

    const datePart = barcode.substring(3,9);

    const yy = datePart.substring(0,2);
    const mm = datePart.substring(2,4);
    const dd = datePart.substring(4,6);

    return {

        barcode: barcode,

        mfgDate: `20${yy}-${mm}-${dd}`,

        productCode: barcode.substring(9,12),

        boxNo: barcode.substring(12,15),

        material: materialName(
            barcode.substring(15,16)
        )

    };
}

function render(){

    document.getElementById("count").innerText =
        scans.length;

    const list =
        document.getElementById("list");

    list.innerHTML = "";

    scans.slice().reverse().forEach(item => {

        list.innerHTML += `
        <div class="item">
            ${item.barcode}
        </div>
        `;

    });
}

function beep(){

    const ctx =
        new (window.AudioContext ||
             window.webkitAudioContext)();

    const oscillator =
        ctx.createOscillator();

    const gain =
        ctx.createGain();

    oscillator.connect(gain);
    gain.connect(ctx.destination);

    oscillator.frequency.value = 1000;

    oscillator.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        ctx.currentTime + 0.1
    );

    oscillator.stop(
        ctx.currentTime + 0.1
    );
}

async function startScanner(){

    try{

       const hints = new Map();
hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [ZXing.BarcodeFormat.QR_CODE]
);

codeReader =
    new ZXing.BrowserMultiFormatReader(hints);

        const video =
            document.getElementById("video");
        video.addEventListener("loadedmetadata", () => {

    const stream = video.srcObject;

    if (stream) {

        currentTrack =
            stream.getVideoTracks()[0];

        console.log("Camera track found");

    }

});
        

        const devices =
            await codeReader.listVideoInputDevices();

        if(devices.length === 0){

            alert("No camera found");

            return;
        }

        const selectedDeviceId =
            devices[devices.length - 1].deviceId;

        codeReader.decodeFromConstraints(
{
video: {
facingMode: "environment"
}
},
video,
(result, err) => {

                if(result){

                    const barcode =
                        result.getText();

                    const now =
                        Date.now();

                    if(
                        barcode === lastScan &&
                        now - lastTime < 1500
                    ){
                        return;
                    }

                    lastScan = barcode;
                    lastTime = now;

                    scans.push(
                        parseBarcode(barcode)
                    );

                    render();

                    beep();
                    if(navigator.vibrate){
    navigator.vibrate(100);
}
                }

            }
        );

    }catch(error){

        console.error(error);

        alert(
            "Camera error. Check browser permissions."
        );
    }
}

function stopScanner(){

    if(codeReader){

        codeReader.reset();
    }
}

    async function toggleTorch() {

    if (!currentTrack) {
        alert("Start scanner first");
        return;
    }

    const capabilities = currentTrack.getCapabilities();

    if (!capabilities.torch) {
        alert("Torch not supported on this device");
        return;
    }

    try {

        torchOn = !torchOn;

        await currentTrack.applyConstraints({
            advanced: [{
                torch: torchOn
            }]
        });

    } catch (err) {

        console.error(err);
        alert("Unable to control torch");

    }
}
    
async function uploadData(){

    if(scans.length === 0){

        alert("No scans found");

        return;
    }

    const unique = [
        ...new Map(
            scans.map(x => [
                x.barcode,
                x
            ])
        ).values()
    ];

    const invoice =
        document.getElementById("invoice")
        .value;

    const records =
        unique.map(x => ({

            invoice,
            ...x

        }));

    try{

        const response =
            await fetch(
                SCRIPT_URL,
                {
                    method:"POST",
                    body:JSON.stringify({
                        records
                    })
                }
            );

        const text =
            await response.text();

        const result =
            JSON.parse(text);

        if(result.success){

            alert(
                `Uploaded ${records.length} unique records`
            );

            scans = [];

            render();

        }else{

            alert(
                "Upload failed"
            );
        }

    }catch(error){

        console.error(error);

        alert(
            "Upload failed"
        );
    }
}

</script>

</body>
</html>
