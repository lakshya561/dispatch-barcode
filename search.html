<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Search</title>

<style>

body{
    font-family:Arial;
    max-width:700px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:16px;
}

.result{
    margin-top:20px;
    border:1px solid #ccc;
    padding:15px;
    border-radius:8px;
}

</style>
</head>

<body>

<h2>Barcode Search</h2>

<input
id="barcode"
placeholder="Enter barcode"
>

<button onclick="searchBarcode()">
Search
</button>

    <hr>

<h3>Upload QR Image</h3>

<input
type="file"
id="imageInput"
accept="image/*">

<button onclick="searchFromImage()">
📷 Search From Image
</button>

    
<button onclick="refreshPage()">
🔄 Refresh
</button>
    

<div id="result"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwnsVvc874mjP7CVq4U2K1wF21n26BXmqkV5TI2dxB0uPJPCWEwinxihqrWt7RsarI_ng/exec";
function formatDate(dateString) {

    if (!dateString) return "";

    return new Date(dateString)
        .toLocaleString("en-IN", {
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
        });

}
async function searchBarcode(){

    const barcode =
        document.getElementById("barcode")
        .value
        .trim();

    if(!barcode){
        alert("Enter barcode");
        return;
    }

    try{

        const response =
            await fetch(
                `${SCRIPT_URL}?barcode=${encodeURIComponent(barcode)}`
            );

        const data =
            await response.json();

        const result =
            document.getElementById("result");

        if(!data.found){

            result.innerHTML =
                "<h3>Barcode Not Found</h3>";

            return;
        }

        result.innerHTML = `

        <div class="result">

            <h3>Found</h3>

            <p><b>Barcode:</b> ${data.barcode}</p>

            <p><b>Invoice:</b> ${data.invoice}</p>

            <p><b>Mfg Date:</b> ${data.mfgDate}</p>

            <p><b>Product Code:</b> ${data.productCode}</p>

            <p><b>Box No:</b> ${data.boxNo}</p>

            <p><b>Material:</b> ${data.material}</p>

            <p><b>Timestamp:</b> ${data.timestamp}</p>

        </div>

        `;

    }catch(error){

        console.error(error);

        alert("Search failed");

    }

}

    function refreshPage(){

    document.getElementById("barcode").value = "";

    document.getElementById("imageInput").value = "";

    document.getElementById("result").innerHTML = "";

}

    async function searchFromImage(){

    const file =
        document.getElementById("imageInput")
        .files[0];

    if(!file){

        alert("Please select an image");

        return;
    }

    const img =
        document.getElementById("previewImage");

    img.src =
        URL.createObjectURL(file);

    img.onload = async () => {

        try{

            const reader =
                new ZXing.BrowserQRCodeReader();

            const result =
                await reader.decodeFromImageElement(img);

            const barcode =
                result.getText();

            document.getElementById("barcode")
                .value = barcode;

            searchBarcode();

        }catch(error){

            console.error(error);

            alert(
                "No QR code found in image"
            );

        }

    };

}

</script>
<img
id="previewImage"
style="display:none;">
</body>
</html>
